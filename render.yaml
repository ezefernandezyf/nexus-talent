services:
  - type: web
    name: nexus-talent-api
    env: node
    buildCommand: pnpm --filter @nexus-talent/server run build && pnpm --filter @nexus-talent/server run prisma:push
    startCommand: cd server && node dist/server/src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://nexustalent.vercel.app
