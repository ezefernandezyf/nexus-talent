services:
  - type: web
    name: nexus-talent-api
    env: node
    buildCommand: cd server && npm install && npx prisma generate && npx tsc
    startCommand: cd server && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://nexus-talent.vercel.app
