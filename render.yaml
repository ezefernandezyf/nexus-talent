services:
  - type: web
    name: nexus-talent-api
    env: node
    buildCommand: pnpm --filter @nexus-talent/server run build
    startCommand: pnpm --filter @nexus-talent/server run start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://nexus-talent.vercel.app
