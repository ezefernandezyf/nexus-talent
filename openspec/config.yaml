# openspec/config.yaml
schema: spec-driven
persistence: hybrid

context: |
  Project: Nexus Talent (AI Job Assistant)
  Stack: React 19, TypeScript, Tailwind 4, Zod 4, Supabase, TanStack Query.
  Architecture: Feature-based Domain Isolation, Decoupled UI.
  Design System: The Precision Instrument.
  Git: Atomic commits (EN title / ES desc), Phase-based branches.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
  apply:
    - Follow AGENTS.md and DESIGN.md strictly
    - Load relevant local skills from ./skills/
  verify:
    - Run unit tests for mappers and validation
    - Verify UI against DESIGN.md principles
  archive:
    - Sync delta specs to main specs
